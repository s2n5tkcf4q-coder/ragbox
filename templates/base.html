<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RAG 知识库问答系统{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body class="light-mode">
    <header class="navbar">
        <div class="navbar-brand">
            <a href="{{ url_for('index') }}" class="logo">📚 RAG 问答系统</a>
        </div>
        <div class="navbar-actions">
            {% block navbar_actions_pre %}{% endblock %}
            <a href="{{ url_for('auth.change_password') }}" class="btn-plain">修改密码</a>
            <!-- 主题切换：白天显示太阳，夜晚显示月亮，通过 CSS 控制显示/隐藏 -->
            <button id="theme-toggle" class="btn-icon" title="切换日/夜模式" aria-label="切换日/夜模式">
                <span class="theme-icon theme-icon-sun">☀️</span>
                <span class="theme-icon theme-icon-moon">🌙</span>
            </button>
            <span class="user-info">
                <span class="user-avatar">👤</span>
                <span class="user-name">{{ current_user.username }}</span>
                <span class="user-role">({{ current_user.role }})</span>
            </span>
            <a href="{{ url_for('auth.logout') }}" class="btn-plain">退出登录</a>
        </div>
    </header>

    <main class="main-container">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
